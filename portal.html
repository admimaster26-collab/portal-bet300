/* ════════════════════════════════════════════════════════════════════════
   BET300 · Cajero V18 — "Oscuro premium pulido"
   • Panel a PANTALLA COMPLETA (sin gestos, sin deslizar).
   • BARRA INFERIOR FIJA: las 5 acciones siempre visibles en toda pantalla.
   • Estilo nuevo: grafito sólido, dorado sobrio, bordes definidos, tipo grande.
   • Backend INTACTO: mismas RPC, mismas claves de localStorage, mismo polling.
   ════════════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080a; --panel:#0e0e12; --surface:#16161c; --surface-2:#1e1e26;
  --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.13);
  --text:#f4f4f7; --muted:#8b8b97; --muted-2:#6a6a76;
  --gold:#e9c25c; --gold-2:#f3d588; --gold-deep:#c79f33;
  --green:#3ad07f; --green-soft:rgba(58,208,127,.14);
  --blue:#5b78ff; --danger:#ff5468;
  --r:16px; --r-sm:12px;
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
button,input,textarea{font-family:var(--font)}
::selection{background:rgba(233,194,92,.28)}
.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

#appFrame{position:fixed;inset:0;width:100vw;height:100vh;border:0;background:var(--bg);z-index:1}

/* ── Launcher (FAB premium) ─────────────────────────────────────────────── */
.launcher{position:fixed;right:18px;bottom:calc(78px + var(--safe-b));z-index:20;border:1px solid var(--gold-deep);cursor:pointer;
  display:flex;align-items:center;gap:11px;padding:0 18px 0 13px;height:54px;border-radius:14px;
  background:#121216;color:var(--gold-2);font-weight:800;font-size:14.5px;
  box-shadow:0 10px 28px rgba(0,0,0,.55);transition:transform .16s,border-color .16s}
.launcher:hover{transform:translateY(-2px);border-color:var(--gold)}.launcher:active{transform:scale(.97)}
.launcher .fb-ico{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;background:rgba(233,194,92,.14);border:1px solid rgba(233,194,92,.3);font-size:17px}
.launcher .fb-sub{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin-top:0}
.launcher .float-badge{position:absolute;top:-6px;right:-6px;min-width:22px;height:22px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--bg)}
.launcher.mini{width:54px;padding:0;justify-content:center}
.launcher.mini .fb-text{display:none}
.launcher-min{position:fixed;right:13px;bottom:calc(120px + var(--safe-b));z-index:21;width:26px;height:26px;border-radius:999px;border:1px solid var(--gold-deep);background:#1a1a20;color:var(--gold-2);font-size:17px;font-weight:900;line-height:22px;text-align:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5);padding:0}
.launcher-min:active{transform:scale(.92)}
/* Botón "pantalla completa": abre la plataforma en pestaña propia (first-party) para que las
   imágenes carguen en TODOS los navegadores (Safari/Samsung/Firefox cortan las cookies de
   terceros dentro del iframe). Bottom-left para no chocar con el launcher del cajero. */
.fullscreen-btn{position:fixed;left:14px;bottom:calc(78px + var(--safe-b));z-index:20;display:flex;align-items:center;gap:6px;padding:9px 13px;border-radius:999px;border:1px solid var(--gold-deep);background:#1a1a20;color:var(--gold-2);font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.fullscreen-btn:active{transform:scale(.96)}
.fullscreen-btn .fs-ico{font-size:15px;line-height:1}
/* Launcher auto-detectado: pantalla de entrada para navegadores que rompen las imágenes del
   iframe (iPhone/Safari, Samsung Internet, Firefox). Los manda a pantalla completa (first-party)
   y deja el cajero a un toque, así no ven el iframe con imágenes rotas ("rechazo visual"). */
.launcher-overlay{position:fixed;inset:0;z-index:40;background:radial-gradient(120% 100% at 50% 0%,#15161d,#0a0a0e 70%);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px 24px;text-align:center}
.launcher-overlay.show{display:flex}
.lo-logo{font-size:14px;font-weight:900;letter-spacing:.6px;color:var(--gold-2)}
.lo-title{font-size:22px;font-weight:900;color:var(--text);line-height:1.22;max-width:340px}
.lo-sub{font-size:13px;color:var(--muted);max-width:320px;line-height:1.5;margin-bottom:6px}
.lo-btn{width:100%;max-width:340px;padding:16px;border-radius:14px;border:1px solid var(--gold-deep);background:var(--gold);color:#1a1a20;font-size:16px;font-weight:900;cursor:pointer}
.lo-btn:active{transform:scale(.98)}
.lo-btn.sec{background:var(--surface-2);color:var(--gold-2)}
.lo-dismiss{margin-top:4px;background:none;border:0;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer}

/* ── Scrim (solo desktop) ───────────────────────────────────────────────── */
.scrim{position:fixed;inset:0;z-index:25;background:rgba(3,3,6,.6);opacity:0;pointer-events:none;transition:opacity .26s}
.scrim.show{opacity:1;pointer-events:auto}

/* ── Panel a pantalla completa ──────────────────────────────────────────── */
.panel{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;background:var(--panel);
  transform:translateY(100%);visibility:hidden;transition:transform .3s cubic-bezier(.22,.9,.28,1),visibility 0s linear .3s}
.panel.open{transform:none;visibility:visible;transition:transform .32s cubic-bezier(.22,.9,.28,1)}

/* Header */
.panel-head{flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:calc(13px + var(--safe-t)) 14px 13px;border-bottom:1px solid var(--line);background:#0c0c10}
.head-avatar{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#15151a;border:1px solid var(--gold-deep);color:var(--gold-2);font-weight:900;font-size:12px;letter-spacing:.5px}
.head-info{flex:1;min-width:0}
.brand-logo{font-size:16.5px;font-weight:900;letter-spacing:-.2px;line-height:1.1}.brand-logo span:first-child{color:var(--gold-2)}
.head-sub{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
.head-sub .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(58,208,127,.16)}
.icon-btn{border:1px solid var(--line);background:#15151a;color:#cfcfd8;border-radius:10px;width:40px;height:40px;cursor:pointer;font-size:20px;line-height:1;transition:background .15s,transform .12s;flex-shrink:0}
.icon-btn:hover{background:#20202a}.icon-btn:active{transform:scale(.92)}

#connBanner{background:#2a0d11;color:#ffb3bd;font-size:12px;font-weight:700;padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,84,104,.25);flex-shrink:0}

/* Cuerpo (pantallas) */
.panel-body{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;padding:18px;padding-bottom:24px;background:var(--panel)}
.screen::-webkit-scrollbar{width:8px}.screen::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}
.screen.in{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#screenChat{padding:0;display:flex;flex-direction:column}
.screen-title{font-size:21px;font-weight:900;letter-spacing:-.4px;margin-bottom:6px}
.screen-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px}

/* ── BARRA INFERIOR FIJA (siempre visible) ──────────────────────────────── */
.panel-nav{flex-shrink:0;display:flex;background:#0a0a0d;border-top:1px solid var(--line-2);padding-bottom:var(--safe-b)}
.nav-item{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:11px 2px 9px;border:none;background:none;color:var(--muted-2);font-size:11px;font-weight:800;cursor:pointer;transition:color .15s}
.nav-item .n-ico{font-size:21px;line-height:1;filter:grayscale(.4);opacity:.85;transition:.15s}
.nav-item:hover{color:var(--muted)}
.nav-item.active{color:var(--gold-2)}
.nav-item.active .n-ico{filter:none;opacity:1;transform:translateY(-1px)}
.nav-item.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:3px;border-radius:0 0 4px 4px;background:var(--gold)}
.nav-item .badge{position:absolute;top:5px;right:calc(50% - 22px);min-width:18px;height:18px;border-radius:999px;background:var(--danger);color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #0a0a0d}

/* ── Inicio: login ──────────────────────────────────────────────────────── */
.gate-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(233,194,92,.1);border:1px solid rgba(233,194,92,.28);color:var(--gold-2);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:800;margin-bottom:16px}
.gate-title{font-weight:900;font-size:24px;letter-spacing:-.5px;margin-bottom:10px}
.gate-txt{font-size:14px;color:#c9c9d2;line-height:1.55;margin-bottom:18px}
.trust-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.trust{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#b3b3bf;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.flow-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:14px}

/* ── Inicio: dashboard ──────────────────────────────────────────────────── */
.greet{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.greet-hi{font-size:13px;color:var(--muted);font-weight:700}
.greet-user{font-size:20px;font-weight:900;letter-spacing:-.3px;margin-top:3px;display:flex;align-items:center;gap:8px}
.link-btn{border:1px solid var(--line);background:var(--surface);color:var(--gold-2);font-size:12.5px;font-weight:800;cursor:pointer;padding:8px 12px;border-radius:10px;transition:.15s}
.link-btn:hover{background:#20202a}
.section-label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin:6px 2px 11px}

.big-btn{width:100%;display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
  border:1px solid var(--line-2);background:var(--surface);color:var(--text);border-radius:var(--r);padding:17px 15px;margin-bottom:12px;
  transition:transform .14s,border-color .14s,background .14s}
.big-btn:hover{background:#1b1b22;border-color:var(--line-2)}.big-btn:active{transform:scale(.99)}
.big-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.big-btn.gold{border-color:rgba(233,194,92,.4);background:linear-gradient(180deg,#1a160e,#15151a)}
.big-btn.gold .bb-ico{background:rgba(233,194,92,.16);border-color:rgba(233,194,92,.45);color:var(--gold-2)}
.big-btn.green{border-color:rgba(58,208,127,.35)}
.big-btn.green .bb-ico{background:var(--green-soft);border-color:rgba(58,208,127,.4);color:var(--green)}
.bb-ico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:25px;background:rgba(255,255,255,.05);border:1px solid var(--line);flex-shrink:0}
.bb-tx{flex:1;min-width:0;font-weight:800;font-size:16.5px}.bb-tx small{display:block;color:var(--muted);font-weight:600;font-size:12.5px;margin-top:3px;line-height:1.35}
.bb-arrow{color:var(--muted-2);font-size:24px;flex-shrink:0}

.row-btn{width:100%;display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:var(--r);padding:15px;font-weight:800;font-size:14.5px;cursor:pointer;transition:.14s}
.row-btn:hover{background:#1b1b22}.row-btn .rb-ico{font-size:19px}.row-btn .rb-arrow{margin-left:auto;color:var(--muted-2);font-size:22px}

.pending-banner{display:flex;align-items:center;gap:12px;cursor:pointer;
  background:#1a160e;border:1px solid rgba(233,194,92,.4);border-radius:var(--r);padding:15px;margin-bottom:16px}
.pending-banner .pb-ico{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(233,194,92,.14);border:1px solid rgba(233,194,92,.35)}
.pending-title{font-weight:900;color:var(--gold-2);font-size:14.5px;display:flex;align-items:center;gap:7px}
.pending-text{font-size:12.5px;color:#cfcfd8;margin-top:3px;line-height:1.4}
.pending-banner .chev{margin-left:auto;font-size:24px;color:var(--gold-2)}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(233,194,92,.5)}70%{box-shadow:0 0 0 7px rgba(233,194,92,0)}100%{box-shadow:0 0 0 0 rgba(233,194,92,0)}}

/* ── Formularios ────────────────────────────────────────────────────────── */
.user-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line-2);color:var(--gold-2);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:800;margin-bottom:14px}
.form-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:#a3a3b0;font-weight:800;margin-bottom:7px}
input,textarea{width:100%;border:1px solid var(--line-2);background:#0c0c11;color:var(--text);border-radius:var(--r-sm);padding:14px;font-size:16px;margin-bottom:12px;transition:border-color .15s,box-shadow .15s}
input::placeholder,textarea::placeholder{color:#56565f}
input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(233,194,92,.14)}
textarea{resize:vertical;min-height:76px}
.muted-line{color:var(--muted);font-size:13px;padding:8px 0}
.welcome-txt{font-size:13.5px;color:#c9c9d2;line-height:1.55}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin:-2px 0 14px}
.chip{border:1px solid var(--line-2);background:#101015;color:#e2e2ea;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:800;cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--gold-deep);color:var(--gold-2)}.chip:active{transform:scale(.96)}
.chip.on{background:rgba(233,194,92,.14);border-color:var(--gold);color:var(--gold-2)}

.action-btn{width:100%;border:1px solid var(--gold-deep);border-radius:var(--r-sm);padding:16px;font-weight:900;font-size:15.5px;cursor:pointer;margin-top:2px;
  background:var(--gold);color:#1a1500;transition:transform .14s,filter .14s,background .14s}
.action-btn:hover{filter:brightness(1.05)}.action-btn:active{transform:scale(.985)}.action-btn:disabled{opacity:.55;cursor:default}
.secondary-btn{background:var(--surface);color:var(--text);border:1px solid var(--line-2)}.secondary-btn:hover{background:#20202a;filter:none}

/* ── Transferencia ──────────────────────────────────────────────────────── */
.transfer-card{background:var(--surface);border:1px solid rgba(233,194,92,.4);border-radius:var(--r);padding:15px;margin-bottom:14px}
.transfer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:13px}
.transfer-title{font-weight:900;color:var(--gold-2);font-size:15.5px}
.share-btn{border:1px solid rgba(233,194,92,.4);background:rgba(233,194,92,.1);color:var(--gold-2);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;transition:.14s}
.share-btn:hover{background:rgba(233,194,92,.18)}.share-btn:active{transform:scale(.95)}
.transfer-field{background:#0c0c11;border-radius:12px;padding:12px;margin-bottom:9px;border:1px solid var(--line);display:flex;align-items:center;gap:10px}
.transfer-field .tf-main{flex:1;min-width:0}
.transfer-label{font-size:10px;color:#8b8b97;text-transform:uppercase;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.transfer-value{font-size:15.5px;font-weight:800;color:#fff;word-break:break-all}
.copy-btn{flex-shrink:0;border:1px solid var(--line-2);border-radius:10px;background:#20202a;color:#fff;padding:11px 13px;font-size:12.5px;font-weight:800;cursor:pointer;transition:.14s}
.copy-btn:hover{background:#2a2a36}.copy-btn.done{background:var(--green);border-color:var(--green);color:#04210f}.copy-btn:active{transform:scale(.94)}
.transfer-hint{font-size:12.5px;color:#cdb878;line-height:1.5;margin-top:8px;display:flex;gap:7px}

/* Skeleton */
.sk{position:relative;overflow:hidden;background:rgba(255,255,255,.05);border-radius:10px}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 1.3s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
.sk-card{border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.sk-line{height:14px;margin-bottom:11px}.sk-line.lg{height:36px}.sk-line.w60{width:60%}.sk-line.w40{width:40%}.sk-line.w80{width:80%}

/* ── Estado ─────────────────────────────────────────────────────────────── */
.estado-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:24px 18px;text-align:center}
.estado-card.pending{border-color:rgba(233,194,92,.4)}
.estado-card.ok{border-color:rgba(58,208,127,.45)}
.estado-card.bad{border-color:rgba(255,84,104,.42)}
.estado-ico{font-size:44px;margin-bottom:12px}
.estado-h{font-weight:900;font-size:19px;margin-bottom:6px}
.estado-sub{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.estado-tx{font-size:13.5px;color:#c9c9d2;line-height:1.55;margin-bottom:16px}
.estado-live{font-size:12.5px;font-weight:800;color:var(--gold-2);background:rgba(233,194,92,.1);border:1px solid rgba(233,194,92,.28);border-radius:999px;padding:8px 14px;display:inline-flex;align-items:center;gap:8px;margin-bottom:18px}
.estado-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.estado-actions .action-btn{margin:0}
.steps{display:flex;align-items:center;gap:6px;justify-content:center;margin:4px 0 18px}
.step .dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.16)}
.step.on .dot{background:var(--gold);box-shadow:0 0 0 4px rgba(233,194,92,.16)}
.step.done .dot{background:var(--green)}
.bar{width:28px;height:3px;border-radius:3px;background:rgba(255,255,255,.12)}
.step.done + .bar{background:var(--green)}
/* Barra de progreso de retiro parcial (punto 3): pagos por partes de un retiro grande */
.rp-wrap{margin:12px 0 4px;text-align:left}
.rp-top{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted);margin-bottom:6px}
.rp-nums{font-weight:800;color:var(--text);font-size:13px}
.rp-track{height:12px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
.rp-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold-deep),var(--gold));transition:width .6s ease;min-width:6px}
.rp-pct{font-size:11px;color:var(--gold-2);margin-top:6px;font-weight:700;text-align:center}
.rp-list{margin-top:11px;display:flex;flex-direction:column;gap:5px}
.rp-item{display:flex;justify-content:space-between;gap:8px;font-size:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
.rp-item .rp-m{font-weight:800;color:var(--green);white-space:nowrap}
.rp-item .rp-f{color:var(--muted)}

/* ── Chat ───────────────────────────────────────────────────────────────── */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;background:var(--panel)}

.msg{display:flex;flex-direction:column;margin-bottom:12px;max-width:90%;animation:msgIn .2s ease}

.msg.bot,.msg.sys{align-items:flex-start;margin-right:auto}.msg.user{align-items:flex-end;margin-left:auto}

.send-btn:active{transform:scale(.92)}
.clip-btn{height:44px;width:44px;padding:0;border:1px solid var(--line);border-radius:12px;background:#15151a;color:#aeb3c6;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s}
.clip-btn:hover{background:#20202a}
#imgPreviewBar{display:flex;align-items:center;background:#0c0c10;padding:8px 12px;border-top:1px solid var(--line);flex-shrink:0}

#imgPreviewBar button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:21px;line-height:1;padding:0 2px;flex-shrink:0}

/* Toast */
.toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%) translateY(10px);z-index:60;background:#16161c;color:#fff;border:1px solid var(--line-2);box-shadow:0 16px 40px rgba(0,0,0,.6);padding:14px 18px;border-radius:12px;font-weight:800;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:320px;text-align:center}

function _navBloqueaImagenes(){
  try{
    const ua=navigator.userAgent||"";

    const samsung=/SamsungBrowser/i.test(ua);
    const firefox=/Firefox|FxiOS/i.test(ua);
    // Safari "de verdad" (no Chrome/Edge/Opera/CriOS/FxiOS que también matchean 'Safari')
    const safari=/Safari/i.test(ua) && !/Chrome|CriOS|Chromium|Edg|OPR|SamsungBrowser|FxiOS|Android/i.test(ua);
    return iOS || samsung || firefox || safari;
  }catch(_e){ return false; }
}

const SCREENS=["home","carga","retiro","clave","estado","chat"];
function showScreen(name){
  state.screen=name;
  SCREENS.forEach(s=>{const el=$("screen"+cap(s));if(el)el.classList.toggle("hidden",s!==name);});

// ── Chat (mensajes) ────────────────────────────────────────────────────────
function scrollChat(){const m=$("messages");if(m)m.scrollTop=m.scrollHeight;}
function scrollBottom(){scrollChat();}
function addMsg(text,who="bot",imgUrl=null){
  const wrap=document.createElement("div");
  wrap.className="msg "+(who==="user"?"user":"bot");
  const imgHtml=imgUrl?`<img class="chat-img" src="${esc(imgUrl)}" onclick="window.open('${esc(imgUrl)}','_blank')" onerror="this.style.display='none'" alt="imagen">`:""
  let cuerpo=String(text);
  if(who!=="user"){ const card=parseTransferCard(text); if(card) cuerpo=renderTransferCardHtml(card); }   // tarjeta solo en bot/sistema
  wrap.innerHTML='<div class="bubble">'+cuerpo+imgHtml+'</div><div class="meta">'+(who==="user"?"Vos":"BET300")+" · "+now()+'</div>';
  $("messages").appendChild(wrap);scrollChat();
}
function incomingOperatorMsg(texto,imgUrl){
  texto=String(texto==null?"":texto);
  // ── Marca oculta de validación: el operador validó la cuenta desde el panel y manda
  //    ⟦INGRESAR:usuario⟧ dentro del mensaje. No mostramos la marca cruda: mostramos el
  //    texto (sin la marca) + un botón "Ingresar" para que entre directo desde el chat.
  let _ingresarUser=null;
  const _mIng=texto.match(/⟦INGRESAR:([^⟧]*)⟧/);
  if(_mIng){ _ingresarUser=String(_mIng[1]||"").trim(); texto=texto.replace(/⟦INGRESAR:[^⟧]*⟧/g,"").trim(); }
  // Dedup central por contenido: el mismo mensaje del operador puede llegar por pollPortalThread
  // Y por pollOperatorMessages (dos fuentes, con claves distintas). Así no se duplica.
  const k=(String(texto||"").trim().slice(0,160))+"|"+(String(imgUrl||"").slice(0,120));
  if(k!=="|"){ if(!state._opMsgSeen) state._opMsgSeen=new Set(); if(state._opMsgSeen.has(k)){ if(_ingresarUser) mostrarBotonIngresar(_ingresarUser); return; } state._opMsgSeen.add(k); }
  if(texto||imgUrl) addMsg(escMsg(texto),"bot",imgUrl||null);
  const fueraDelChat = state.screen!=="chat" || !$("widget")?.classList.contains("open");
  if(fueraDelChat){ bumpUnread(); try{ showOperatorBubble(texto,imgUrl); }catch(_e){} }
  if(_ingresarUser) mostrarBotonIngresar(_ingresarUser);
}
// Botón "Ingresar" dentro del chat: aparece cuando el operador validó la cuenta (por la marca
// ⟦INGRESAR⟧ o por el auto-chequeo del cotejo). Al tocarlo, revalida y entra directo al home.
function mostrarBotonIngresar(usuario){
  usuario=String(usuario||"").trim() || (state.usuario||"");
  if((state.nivelAcceso||"")==="OK") return;                 // ya está adentro
  if(state._ingresarUserShown===usuario && $("btnIngresarValidado")) return; // no duplicar
  state._ingresarUserShown=usuario;
  const prev=$("btnIngresarValidado"); if(prev){ const pm=prev.closest(".msg"); if(pm) pm.remove(); }
  const msgs=$("messages"); if(!msgs) return;
  const wrap=document.createElement("div");

async function rpc(fn,params){if(!sb)return{data:null,error:{message:"Supabase no configurado"}};const{data,error}=await sb.rpc(fn,params||{});return{data,error}}
function normalize(data){if(!data)return null;if(Array.isArray(data))return data[0]||null;if(data.data)return Array.isArray(data.data)?data.data[0]:data.data;return data}

async function pollOperatorMessages(){
  if(!state.chatId||!$("widget")?.classList.contains("open"))return;
  const res=await rpc("landing_leer_chat_v2",{p_chat_id:Number(state.chatId),p_chat_token:state.chatToken});
  if(res.error||!Array.isArray(res.data)){_onPollFail();return;}
  _onPollOk();
  res.data.forEach(m=>{
    const msgKey=String(m.id||m.created_at||JSON.stringify(m));
    if(state.seenMsgIds.has(msgKey))return;
    state.seenMsgIds.add(msgKey);
    const emisor=String(m.tipo_emisor||m.emisor||"").toUpperCase();
    const isOp=emisor.includes("OPER")||emisor.includes("ADMIN")||emisor.includes("PANEL")||emisor.includes("SIST")||emisor.includes("BOT")||emisor.includes("AUTO");
    const texto=m.mensaje||m.texto||"";

async function autoChequeoValidacion(){

function threadKey(m){
  return String((m?.origen||"")+"|"+(m?.solicitud_id||"")+"|"+(m?.fecha||"")+"|"+(m?.mensaje||""));
}
// Render de UN mensaje del thread (historial o nuevo), del operador o del propio usuario.
// notificar=true SOLO para mensajes que no vimos en una sesión previa → recién ahí bumpeamos
// unread / burbuja / notificación (y solo si el chat no está enfocado). Así el historial completo
// se pinta al abrir el chat sin spamear notificaciones.
function renderThreadMsg(m, notificar){
  const origen=String(m.origen||"").toUpperCase();
  const rawTexto=m.mensaje||"";
  const imgUrl=m.imagen_url||m.imagen||null;
  if(!rawTexto&&!imgUrl)return;
  if(origen==="OPERADOR"){
    // Marca oculta de validación ⟦INGRESAR:usuario⟧ → botón "Ingresar" (se saca del texto visible).
    let ing=null, texto=rawTexto;
    const mm=rawTexto.match(/⟦INGRESAR:([^⟧]*)⟧/);
    if(mm){ ing=String(mm[1]||"").trim(); texto=rawTexto.replace(/⟦INGRESAR:[^⟧]*⟧/g,"").trim(); }
    // Dedup por contenido, compartido con pollOperatorMessages (misma clave, texto crudo).
    const tk=rawTexto?rawTexto.substring(0,200):((m.fecha||"")+"|img|"+(imgUrl||"").substring(0,80));
    if(!state.shownTexts.has(tk)){
      state.shownTexts.add(tk);
      if(texto||imgUrl) addMsg(escMsg(texto),"bot",imgUrl||null);
      if(notificar){
        const fuera=state.screen!=="chat"||!$("widget")?.classList.contains("open");
        if(fuera){ bumpUnread(); try{ showOperatorBubble(texto,imgUrl); }catch(_e){} if(texto){ try{ notificarLocal("BET300 · Operador",texto.substring(0,100),"/","bet300-op"); }catch(_e){} } }
      }
    }
    if(ing) mostrarBotonIngresar(ing);
  } else {
    // Mensaje del propio usuario (historial). Dedup por contenido contra lo ya mostrado en vivo.
    const uk=rawTexto?("u|"+rawTexto.substring(0,200)):("uimg|"+(imgUrl||"").substring(0,80));
    if(state.shownTexts.has(uk))return;
    state.shownTexts.add(uk);
    addMsg(rawTexto?escMsg(rawTexto):"","user",imgUrl||null);
  }
}
async function pollPortalThread(){
  if(!state.usuario||!$("widget")?.classList.contains("open"))return;
  // Respaldo: si el operador validó desde el panel pero la marca ⟦INGRESAR⟧ no llegó/no se vio
  // (p.ej. tras recargar la página), re-chequeamos el cotejo cada ~10s SOLO mientras el usuario
  // todavía no entró. Al detectar ACCESO, mostramos el botón "Ingresar" igual.
  if((state.nivelAcceso||"")!=="OK" && state.telefono){
    state._revalTick=(state._revalTick||0)+1;
    if(state._revalTick===1 || state._revalTick%3===0){ autoChequeoValidacion(); }
  }
  const res=await rpc("landing_portal_chat_thread_get",{p_usuario:state.usuario,p_public_code:state.publicCode,p_telefono:state.telefono||""});
  if(res.error){console.warn("[chat_thread]",res.error);_onPollFail();return;}
  _onPollOk();
  const d=normalize(res.data)||res.data||{};
  const thread=Array.isArray(d.chat_thread)?d.chat_thread:[];
  if(!thread.length)return;

  // _threadRendered = set de SESIÓN (lo que ya está en el DOM ahora). Al recargar arranca vacío,
  // así que el historial completo se vuelve a pintar. portalThreadSeen (persistido) solo decide si
  // el mensaje es "nuevo" (para notificar) o parte del historial ya visto.
  if(!state._threadRendered) state._threadRendered=new Set();
  thread.forEach(m=>{
    const key=threadKey(m);
    if(state._threadRendered.has(key))return;
    state._threadRendered.add(key);
    const nuevo=!state.portalThreadSeen.has(key);
    state.portalThreadSeen.add(key);
    renderThreadMsg(m, nuevo);
  });
  savePortalThreadSeen();
}

// que recién quieren registrarse (un pariente les pasó el link). Entran al chat directo
// y el operador los registra/vincula desde el panel. NO pelea con el cotejo.
function _persistSoporte(){

    localStorage.setItem("bet300_usuario",state.usuario);

// REGISTRO: usuario NUEVO (publicidad / derivado). Pide nombre/apodo + tel y manda al operador
// un ticket CLARO de alta nueva. No pelea con el cotejo (no tiene usuario aún).
// OJO: el bono de bienvenida NO es de "nuevos" — es para la PRIMERA carga de CUALQUIERA, y lo
// maneja la tarjeta de bono en Inicio (renderBonoBienvenidaCard). Este flujo NO lo menciona.
function pedirRegistro(){
  const nombre=String($("usuarioInicial")?.value||"").trim();
  const telefono=String($("telefonoInicial")?.value||"").trim();
  if(!telefono || telefono.replace(/\D/g,"").length<6){ return _gateError("Dejanos tu teléfono (con código de área) para crearte el usuario y contactarte."); }
  state.usuario = nombre || ("nuevo-"+telefono.replace(/\D/g,""));
  state.telefono = telefono;
  state.nivelAcceso = "SOPORTE";
  state.motivoSoporte = "Registro en proceso · Un operador te crea el usuario y te avisa por el chat.";
  _persistSoporte();
  renderHome();
  escribirSoporteAlta("registro"); // abre el chat Y auto-envía el pedido de alta nueva
}
// AYUDA DE ACCESO: el que YA tiene usuario pero no puede entrar (datos mal / no validado).
// Ticket distinto para que el operador no lo confunda con un alta nueva.
function pedirAyudaAcceso(){
  const usuario=String($("usuarioInicial")?.value||"").trim();
  const telefono=String($("telefonoInicial")?.value||"").trim();
  if(!telefono || telefono.replace(/\D/g,"").length<6){ return _gateError("Dejanos tu teléfono (con código de área) para poder ayudarte a validar tu cuenta."); }
  state.usuario = usuario || ("ayuda-"+telefono.replace(/\D/g,""));
  state.telefono = telefono;
  state.nivelAcceso = "SOPORTE";
  state.motivoSoporte = "Estamos viendo por qué no podés entrar. Un operador valida tus datos y te avisa por el chat.";
  _persistSoporte();

  escribirSoporteAlta("ayuda"); // abre el chat Y auto-envía el pedido de ayuda de acceso

// Normaliza el usuario de plataforma antes de mandarlo a validar: saca espacios/acentos, baja a
// minúsculas y, si vino un email (autorelleno del navegador), se queda con lo de antes del @.
// NO bloquea ni pelea con el cliente: si igual quedó mal, el operador lo corrige con la marca
// ⟦INGRESAR:usuario⟧ (autologueo, sin que la persona vuelva a cargar sus datos).
function normalizarUsuarioPlataforma(raw){
  let u=String(raw||"").trim();
  if(!u) return "";
  if(u.includes("@")) u=u.split("@")[0];                       // email autorellenado → nombre de usuario
  u=u.normalize("NFD").replace(new RegExp("[\\u0300-\\u036f]","g"),"");  // saca acentos
  u=u.replace(/\s+/g,"");                                      // sin espacios (nombres pegados quedan legibles)
  u=u.toLowerCase();
  u=u.replace(/[^a-z0-9._-]/g,"");                             // solo lo típico de un usuario de plataforma
  return u;
}
async function guardarUsuarioInicial(){
  const usuario=normalizarUsuarioPlataforma($("usuarioInicial")?.value||"");
  const telefono=String($("telefonoInicial")?.value||"").trim();
  const err=$("gateError"); if(err)err.style.display="none";
  if(!usuario)return _gateError("Indicá tu usuario de plataforma (el nombre con el que entrás a jugar, no tu email).");
  if(!telefono || telefono.replace(/\D/g,"").length<6)return _gateError("Indicá tu teléfono con código de área (sin 0 ni 15).");
  if(!state.pcCodigo)return _gateError("No identificamos tu oficina. Abrí el enlace de tu oficina o contactá a soporte.");

  const btn=$("gateBtn"); if(btn){btn.disabled=true;btn.textContent="Verificando...";}
  let d={};
  try{
    const r=await rpc("landing_portal_resolver_vinculo",{p_pc_codigo:state.pcCodigo,p_usuario:usuario,p_telefono:telefono});
    d=normalize(r.data)||r.data||{};
    if(r.error){ console.warn("[vinculo]",r.error); d={verdict:"ERROR"}; }
  }catch(e){ console.warn("[vinculo]",e); d={verdict:"ERROR"}; }
  if(btn){btn.disabled=false;btn.textContent="Ingresar al portal";}

  const verdict=d.verdict||"";
  // Datos vacíos / teléfono inválido → corregilo acá mismo, en el gate.
  if(verdict==="SIN_USUARIO"||verdict==="TEL_INVALIDO"){
    return _gateError(d.mensaje||"Revisá tu usuario y teléfono.");
  }

  state.usuario=usuario;
  state.telefono=telefono;
  localStorage.setItem("bet300_usuario",usuario);
  localStorage.setItem("bet300_telefono",telefono);
  if(d.estado)localStorage.setItem("bet300_vinculo_estado",d.estado);

  // ✅ Cotejo OK → validado desde el inicio, entra directo a operar.
  if(verdict==="ACCESO"){
    state.nivelAcceso="OK"; localStorage.setItem("bet300_nivel_acceso","OK");
    state.motivoSoporte=""; localStorage.removeItem("bet300_motivo_soporte");
    renderHome();
    setTimeout(()=>subscribePush(),1500);
    setTimeout(()=>marcarAppInstalada(),1700);
    toast("✅ "+(d.mensaje||"Acceso verificado."));
    return;
  }

  // ⚠️ Cualquier otro caso (no validó al toque, dato mal escrito, usuario aún sin activar, conflicto o
  // error de cotejo): NO lo dejamos en un 🟡 sin salida ni obligamos a "Cambiar usuario" + reloguear.
  // Lo mandamos al MISMO canal de validación con operador (ticket con usuario+tel + chat) para que lo
  // valide/CORRIJA y le habilite el botón "Ingresar" (autologueo con el usuario correcto, sin re-login).
  // En paralelo corre el auto-chequeo del cotejo: si da ACCESO solo, aparece el botón "Ingresar" igual.
  const conflicto=(verdict==="CONFLICTO_TELEFONO"||verdict==="CONFLICTO_USUARIO"||verdict==="BLOQUEADO");
  state.nivelAcceso="SOPORTE";
  state.motivoSoporte = conflicto
    ? (d.mensaje||"Tus datos figuran con otra cuenta. Un operador lo revisa y te habilita el ingreso por acá.")
    : (d.mensaje||"Estamos validando tu usuario. En un momento te habilitamos el botón para ingresar por acá — no hace falta que vuelvas a cargar tus datos.");
  localStorage.setItem("bet300_nivel_acceso","SOPORTE");
  localStorage.setItem("bet300_motivo_soporte",state.motivoSoporte);
  renderHome();
  setTimeout(()=>subscribePush(),1500);
  setTimeout(()=>marcarAppInstalada(),1700);
  iniciarValidacionUsuarioBackground(usuario);   // cotejo en agentes (autohabilita "Ingresar" si da ACCESO)
  escribirSoporteAlta("validar");                 // ticket claro para el operador + abre el chat
}

async function consultarEstadoSolicitud(mostrarMensaje=true){
  const sid=solicitudIdValido();
  if(!sid){if(mostrarMensaje)toast("No hay una solicitud válida para consultar.");return null;}
  const chatIdNum=/^\d+$/.test(String(state.chatId||""))?Number(state.chatId):null;
  const res=await rpc("landing_estado_solicitud_segura",{
    p_solicitud_id:typeof sid==="number"?sid:0,
    p_chat_id:chatIdNum,
    p_chat_token:state.chatToken||""
  });
  if(res.error){if(mostrarMensaje)toast("No pude consultar el estado ahora.");return null;}
  const d=normalize(res.data)||res.data||{};
  if(d.ok===false){setEstadoLive("⏳ En verificación");return "PENDIENTE";}
  const estado=estadoNormalizado(d.estado||d.status||d.estado_solicitud);
  const obs=String(d.obs||d.observacion||d.motivo||d.razon||"").trim();
  if(esEstadoFinalAprobado(estado)){
    if(esConfirmacionDemasiadoTemprana()){setEstadoLive("⏳ En verificación");return "PENDIENTE";}
    limpiarPendienteAprobado(obs);
    return estado;
  }
  if(esEstadoFinalRechazado(estado)){
    rechazadoStreak++;
    if(rechazadoStreak < 3){setEstadoLive("⏳ En verificación");return "PENDIENTE";}
    stopEstadoPoll();
    rechazadoStreak=0;
    const eraRetiro = String(state.pendingTipo||"").toUpperCase()==="RETIRO";
    state.pendingTipo="";state.solicitudId="";
    ["bet300_pending_tipo","bet300_solicitud_id","bet300_solicitud_started_at"].forEach(k=>localStorage.removeItem(k));
    // Retiro rechazado/cancelado por el operador → no se efectuó → liberar el cooldown de 24h.
    if(eraRetiro){ try{localStorage.removeItem(_retiroKey());}catch(_e){} }
    const s=$("screenEstado");
    if(s)s.innerHTML=`<div class="screen-title">Estado</div>
      <div class="estado-card bad">
        <div class="estado-ico">⚠️</div>
        <div class="estado-h">Tu solicitud no pudo procesarse</div>
        ${obs?`<div class="estado-tx">${escMsg(obs)}</div>`:`<div class="estado-tx">Escribinos por el chat y un operador te ayuda.</div>`}
        <div class="estado-actions"><button class="action-btn" onclick="goChat()">💬 Consultar</button><button class="action-btn secondary-btn" onclick="goCarga()">Nueva carga</button></div>
      </div>`;
    renderHome();
    if($("widget")?.classList.contains("open"))showScreen("estado");
    return estado;
  }
  rechazadoStreak=0;
  if(String(state.pendingTipo||"").toUpperCase()==="RETIRO") cargarProgresoRetiro().catch(()=>{});
  // Retiro EN_PROCESO = pago por partes → pantalla claramente distinta a un retiro normal demorado
  // (esto anda solo con landing_estado_solicitud_segura; la barra detallada requiere landing_retiro_progreso).
  if(estado==="EN_PROCESO"){
    try{ const s=$("screenEstado"); const h=s&&s.querySelector(".estado-h"); if(h)h.textContent="🔄 Retiro en proceso";
         const sub=s&&s.querySelector(".estado-sub"); if(sub)sub.textContent="Te lo estamos pagando por partes — vas a ver cada pago acá";
         const tx=s&&s.querySelector(".estado-tx"); if(tx)tx.textContent="Tu retiro es grande y lo abonamos por tramos. Cada transferencia aparece abajo y te avisamos."; }catch(_e){}
  }
  setEstadoLive(estado==="EN_PROCESO"?"💸 Te estamos pagando por partes":"⏳ En verificación");
  return estado||"PENDIENTE";
}

// Retiros parciales (punto 3): trae total/pagado/pagos y pinta la barra + la lista en el estado.
// Muestra un toast in-app cuando sube lo pagado; el aviso de fondo lo dispara el panel por push.
async function cargarProgresoRetiro(){
  const sid=solicitudIdValido(); if(!sid) return;
  const box=$("retiroProgreso"); if(!box) return;
  const res=await rpc("landing_retiro_progreso",{p_solicitud_id: typeof sid==="number"?sid:0, p_chat_id:null, p_chat_token:state.chatToken||""});
  if(res.error) return;
  const prog=normalize(res.data)||res.data||{};
  if(!prog || prog.ok===false) return;
  const total=Number(prog.total||0), pagado=Number(prog.pagado||0);
  let pct=Number(prog.pct||0); if(pct<0)pct=0; if(pct>100)pct=100;
  if(!(total>0) || !(pagado>0)){ box.innerHTML=""; return; }   // sin parciales aún → sin barra
  try{
    const k="bet300_retiro_pagado_"+sid, last=Number(localStorage.getItem(k)||0);
    if(pagado>last){ localStorage.setItem(k,String(pagado));
      if(last>0) toast("💸 Pago parcial: +"+_money(pagado-last)+" · van "+_money(pagado)+" de "+_money(total)); }
  }catch(_e){}
  try{ const s=$("screenEstado"); const h=s&&s.querySelector(".estado-h"); if(h)h.textContent="Retiro en proceso";
       const sub=s&&s.querySelector(".estado-sub"); if(sub)sub.textContent="Te lo estamos pagando por partes"; }catch(_e){}
  let pagos=prog.pagos; if(typeof pagos==="string"){ try{pagos=JSON.parse(pagos);}catch(_e){pagos=[];} } if(!Array.isArray(pagos)) pagos=[];
  const lista=pagos.slice().reverse().map(p=>{
    const m=_money(Number(p.monto||0));
    let f=""; try{ f=new Date(p.fecha).toLocaleString("es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(_e){}
    return `<div class="rp-item"><span class="rp-m">+${m}</span><span class="rp-f">${esc(f)}</span></div>`;
  }).join("");
  box.innerHTML=`<div class="rp-wrap">
    <div class="rp-top"><span>Pagado</span><span class="rp-nums">${_money(pagado)} / ${_money(total)}</span></div>
    <div class="rp-track"><div class="rp-fill" style="width:${pct}%"></div></div>
    <div class="rp-pct">${pct}% · faltan ${_money(Math.max(total-pagado,0))}</div>
    ${lista?`<div class="rp-list">${lista}</div>`:""}
  </div>`;
}

// ── Validación usuario (agentes, en background) ────────────────────────────
async function iniciarValidacionUsuarioBackground(usuario){
  const u=String(usuario||"").trim();
  if(!u)return;
  try{
    const r=await rpc("landing_validar_usuario_login",{p_usuario:u,p_pc_codigo:state.pcCodigo});
    if(r.error)return;
    const row=normalize(r.data)||r.data||{};
    const validacionId=row.validacion_id||row.id||null;
    if(validacionId)localStorage.setItem("bet300_validacion_id",String(validacionId));
    if(validacionId){
      let intentos=0;
      const t=setInterval(async()=>{
        intentos++;
        if(intentos>8){clearInterval(t);return;}
        const st=await rpc("landing_estado_validacion_usuario",{p_validacion_id:Number(validacionId)});
        if(st.error)return;
        const sr=normalize(st.data)||st.data||{};
        const estado=estadoNormalizado(sr.estado||sr.status);
        if(["EXISTE","EXISTIR","NO_EXISTE","ERROR","RECHAZADO"].includes(estado)){clearInterval(t);localStorage.setItem("bet300_validacion_estado",estado);}
      },2500);
    }
  }catch(e){}
}

// ── Ruta e inicialización ─────────────────────────────────────────────────
async function initRoute(){
  // 1) ?r= explícito (compatibilidad vieja / override) → se persiste para la PWA.
  const qp=(new URLSearchParams(location.search).get("r")||"").trim();
  if(qp){ state.publicCode=qp; try{ localStorage.setItem("bet300_public_code", qp); }catch(_e){} }
  // 2) Por subdominio/host (modo producción) si no vino ?r=.
  if(!qp){
    try{
      const rh=await rpc("landing_resolver_ruta_por_host",{p_host:location.host});
      const dh=normalize(rh.data)||rh.data||{};
      if(dh && dh.ok && (dh.pc_codigo||dh.public_code)){
        state.pcCodigo=dh.pc_codigo||null;
        if(dh.public_code){ state.publicCode=dh.public_code; try{localStorage.setItem("bet300_public_code",dh.public_code);}catch(_e){} }
        console.log("[BET300] oficina por host",location.host,"->",state.pcCodigo,state.publicCode);
        if(state.pcCodigo) return;
      }
    }catch(_e){}

// ── Producción: compresión de imágenes ──────────────────────────────────────
async function comprimirImagenPortal(file, opts={}){
  const TIPOS=["image/jpeg","image/png","image/webp"];
  if(!file || !TIPOS.includes(String(file.type||"").toLowerCase())) return null;
  if(file.size > 5*1024*1024) return null;
  const maxLado = opts.maxLado || 1280, calidad = opts.calidad || 0.72;
  try{
    let w,h,src,bitmap=null;
    bitmap = await createImageBitmap(file).catch(()=>null);
    if(bitmap){ w=bitmap.width; h=bitmap.height; src=bitmap; }
    else{
      src = await new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=URL.createObjectURL(file); });
      w=src.naturalWidth; h=src.naturalHeight;
    }
    if(!w||!h) return null;
    let nw=w, nh=h;
    if(Math.max(w,h) > maxLado){ const r=maxLado/Math.max(w,h); nw=Math.round(w*r); nh=Math.round(h*r); }
    const canvas=document.createElement("canvas"); canvas.width=nw; canvas.height=nh;
    canvas.getContext("2d").drawImage(src,0,0,nw,nh);
    try{ if(bitmap&&bitmap.close) bitmap.close(); }catch(_e){}
    return await new Promise(res=>canvas.toBlob(res,"image/jpeg",calidad));
  }catch(_e){ return null; }
}

function parseTransferCard(text){
  const t=String(text||"");
  const m=t.match(/::TRANSFER_CARD::\s*(\{[\s\S]*\})/);
  if(m){ try{ const d=JSON.parse(m[1].replace(/&quot;/g,'"').replace(/&amp;/g,'&')); if(d&&(d.alias||d.cbu||d.cvu)) return d; }catch(_e){} }
  const unesc=(s)=>String(s||"").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#0?39;/g,"'").trim();
  const grab=(re)=>{ const mm=t.match(re); return mm?unesc(mm[1].replace(/<[^>]*>/g,"")):""; };
  const alias=grab(/alias\s*[:：]\s*([^\n<]+)/i);
  const cbucvu=grab(/cbu\s*\/\s*cvu\s*[:：]\s*([0-9\s.\-]+)/i);
  const cbu=grab(/(?:^|\s)cbu\s*[:：]\s*([0-9\s.\-]+)/i);
  const cvu=grab(/(?:^|\s)cvu\s*[:：]\s*([0-9\s.\-]+)/i);
  const titular=grab(/titular\s*[:：]\s*([^\n<]+)/i);
  const banco=grab(/banco\s*[:：]\s*([^\n<]+)/i);
  const tipo=grab(/(?:^|\s)tipo\s*[:：]\s*([^\n<]+)/i);
  const nombre=grab(/nombre\s*[:：]\s*([^\n<]+)/i);
  if(alias||cbu||cvu||cbucvu) return {nombre_visible:nombre,titular,alias,cbu:cbu||cbucvu,cvu,banco:banco||tipo};
  return null;
}

function inferirTipoBilletera(b){
  const raw=[b?.banco,b?.tipo,b?.nombre_visible,b?.nombre,b?.alias,b?.cbu,b?.cvu].map(x=>String(x||"").toUpperCase()).join(" ");
  const alias=String(b?.alias||"").toLowerCase();
  const cbu=String(b?.cbu||b?.cvu||"");
  if(alias.endsWith(".mp")||cbu.startsWith("00000031")||raw.includes("MERCADO"))return "Mercado Pago";
  if(raw.includes("NARANJA")||raw.includes("NX")||cbu.startsWith("453"))return "Naranja X";
  if(raw.includes("UALA")||raw.includes("UALÁ"))return "Ualá";
  if(raw.includes("PERSONAL"))return "Personal Pay";
  if(raw.includes("BRUBANK"))return "Brubank";
  if(raw.includes("BANCO"))return "Banco";
  return "Billetera";
}

function _vapidKey(b64){
  const pad="=".repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,"+").replace(/_/g,"/"));
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}
async function subscribePush(){

// Banner "hay versión nueva · Actualizar" para la PWA instalada. Aparece solo cuando el SW nuevo
// quedó en espera (o sea, ya había una versión corriendo). No molesta a quien recién instala.
function mostrarActualizarPWA(reg){
  if(document.getElementById("swUpdateBanner"))return;
  const b=document.createElement("div");
  b.id="swUpdateBanner";
  b.style.cssText="position:fixed;left:12px;right:12px;bottom:calc(14px + var(--safe-b));z-index:99999;background:#11203a;border:1px solid var(--gold-deep);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 34px rgba(0,0,0,.55)";
  b.innerHTML='<div style="flex:1;font-size:13px;font-weight:700;color:#eaf2ff;line-height:1.35">🔄 Hay una versión nueva del cajero.</div>'
    +'<button id="swUpdBtn" style="background:var(--gold);color:#1a1500;border:none;border-radius:10px;padding:9px 15px;font-weight:800;cursor:pointer;flex-shrink:0">Actualizar</button>';
  document.body.appendChild(b);
  document.getElementById("swUpdBtn").onclick=function(){
    window._swWillReload=true; this.textContent="Actualizando…"; this.disabled=true;
    try{ if(reg&&reg.waiting) reg.waiting.postMessage({type:"SKIP_WAITING"}); else window.location.reload(); }
    catch(_e){ window.location.reload(); }
  };
}
// Rendimiento: cuando la app pasa a segundo plano (oculta), pausamos TODOS los polls para no
// pegarle a Supabase al pedo; al volver, reanudamos según el estado (widget abierto / pendiente).
function _reanudarPollsVisibles(){
  const abierto = $("widget")?.classList.contains("open");
  if(abierto){
    if(state.chatId) startChatPoll();
    if(state.usuario) startPortalThreadPoll();
  }
  if(tieneSolicitudPendiente()) startEstadoPoll();
}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden"){ stopChatPoll(); stopPortalThreadPoll(); stopEstadoPoll(); }
  else { _reanudarPollsVisibles(); }
});
window.addEventListener("load",async()=>{
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("/sw.js").then(reg=>{
      // ¿ya hay una versión nueva esperando de antes?
      if(reg.waiting && navigator.serviceWorker.controller) mostrarActualizarPWA(reg);
      // detectar cuando se instala una versión nueva mientras la app está abierta
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing; if(!nw)return;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller) mostrarActualizarPWA(reg);
        });
      });
      // chequear si hay update cada 1h y cada vez que vuelven a la app
      setInterval(()=>{ reg.update().catch(()=>{}); }, 60*60*1000);
      document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") reg.update().catch(()=>{}); });
    }).catch(e=>console.warn("[SW]",e));
    // recargar SOLO cuando el usuario aceptó actualizar (no en la primera instalación)
    navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(window._swWillReload) window.location.reload(); });
  }
  // El iframe ya trae src en el HTML (carga desde el parseo, lo antes posible). Solo lo seteamos
  // acá si quedó vacío → así NO recargamos la plataforma (antes se cargaba 2 veces = doble espera).
  try{ const _af=$("appFrame"); if(_af && (!_af.getAttribute("src") || _af.getAttribute("src")==="about:blank")) _af.src=PLATFORM_URL; }catch(_e){}
  restoreLauncherMini();
  await initRoute();
  await cargarPromoActiva();
  setTimeout(marcarAppInstalada, 2500);
  renderHome();
  showScreen("home");
  mostrarLauncherSiHaceFalta();
  if(tieneSolicitudPendiente()){
    startEstadoPoll();
    chequearPendienteViejo();
  }
});
</script>
